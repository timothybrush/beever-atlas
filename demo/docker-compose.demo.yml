# Demo override — extends docker-compose.yml to add the seed-loader service.
#
# Usage:
#   make demo
#   # which runs: docker compose -f docker-compose.yml -f demo/docker-compose.demo.yml up --build
#
# The seed-loader waits for the beever-atlas backend to be healthy (which in turn
# waits for Weaviate, Neo4j, MongoDB, and Redis), then seeds all three stores with
# pre-computed fixtures from demo/fixtures/. Seeding completes in <30 seconds and
# requires zero API keys.
#
# To ask questions after seeding, set GOOGLE_API_KEY in .env (free tier at
# https://aistudio.google.com — no credit card required).

services:
  seed-loader:
    build: .                             # reuses main Dockerfile
    depends_on:
      beever-atlas:
        condition: service_healthy       # waits for all DBs via backend healthcheck
    env_file: .env
    environment:
      WEAVIATE_URL: http://weaviate:8080
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-beever_atlas_dev}
      MONGODB_URI: mongodb://mongodb:27017/beever_atlas
      REDIS_URL: redis://redis:6379
    # Mount the WHOLE demo/ dir (read-only) so the loader has seed.py itself —
    # the runtime image ships only src/ + scripts/ (see Dockerfile, Issue #39
    # hardening), so demo/ is NOT baked in. Mounting just corpus/ + fixtures/
    # left `python demo/seed.py` failing with "No such file or directory", so
    # the loader crashed and silently seeded nothing.
    volumes:
      - ./demo:/app/demo:ro
    command: ["python", "demo/seed.py"]
    restart: "no"
