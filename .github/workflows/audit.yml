name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. CodeQL alert #3 — actions/missing-workflow-permissions.
permissions:
  contents: read

jobs:
  audit:
    name: pip-audit + npm audit (HIGH/CRITICAL gate)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Export locked requirements (without editable project)
        run: uv export --quiet --no-emit-project --format requirements-txt --no-hashes > /tmp/requirements-audit.txt

      - name: pip-audit (Python deps)
        # PYSEC-2025-183 (pyjwt): disputed by the maintainer and has NO fixed
        # release — every pyjwt version through 2.12.1 is "affected", and the
        # advisory is about caller-chosen key length, not a library defect.
        # pyjwt is pulled transitively via mcp[crypto]; nothing to upgrade to.
        # Revisit if/when an upstream fix or undispute lands.
        #
        # PYSEC-2026-161 (starlette): fixed in starlette 1.0.1, but starlette is
        # pulled transitively via fastapi / google-adk / sse-starlette / mcp, and
        # google-adk (even latest 2.1.0) pins `starlette<1.0.0`. We can't reach
        # 1.0.1 without google-adk catching up. Revisit when google-adk relaxes
        # its starlette pin.
        run: uv run --with pip-audit pip-audit --requirement /tmp/requirements-audit.txt --ignore-vuln PYSEC-2025-183 --ignore-vuln PYSEC-2026-161

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: npm audit (web)
        working-directory: web
        run: npm audit --audit-level=high

      - name: npm audit (bot)
        working-directory: bot
        run: npm audit --audit-level=high
