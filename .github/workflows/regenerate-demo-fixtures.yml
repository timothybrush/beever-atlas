name: Regenerate demo fixtures (maintainer)

# Manually-triggered, maintainer-only. Runs the LIVE extraction pipeline against
# the demo corpus to produce real pre-computed fixtures, then commits them back
# to the triggering branch. `make demo` stays zero-key for everyone else because
# these committed fixtures already contain the embeddings.
#
# Requires repo secrets: GOOGLE_API_KEY (Gemini) + JINA_API_KEY (embeddings).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regen-demo-fixtures-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      # Compose-interpolation values (the datastores read these). The store
      # data is thrown away after the run — only the written fixtures matter.
      NEO4J_PASSWORD: ci_neo4j_regen_pw
      WEAVIATE_API_KEY: ci_weaviate_regen_key
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - uses: docker/setup-buildx-action@v4

      - name: Guard — required secrets present
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: |
          [ -n "$GOOGLE_API_KEY" ] || { echo "::error::GOOGLE_API_KEY secret is not set"; exit 1; }
          [ -n "$JINA_API_KEY" ]  || { echo "::error::JINA_API_KEY secret is not set"; exit 1; }

      - name: Prepare .env with live keys
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: |
          cp .env.example .env
          # Replace the two key lines without echoing values (GHA masks secrets,
          # but avoid sed injection by rebuilding the file).
          grep -v -E '^(GOOGLE_API_KEY|JINA_API_KEY)=' .env > .env.tmp
          { printf 'GOOGLE_API_KEY=%s\n' "$GOOGLE_API_KEY"; printf 'JINA_API_KEY=%s\n' "$JINA_API_KEY"; } >> .env.tmp
          mv .env.tmp .env

      - name: Regenerate fixtures via live ingestion
        run: |
          set -e
          docker compose -f docker-compose.yml -f demo/docker-compose.regen.yml up -d --build fixture-writer
          cid=$(docker compose -f docker-compose.yml -f demo/docker-compose.regen.yml ps -q fixture-writer)
          [ -n "$cid" ] || { echo "::error::fixture-writer container not found"; exit 1; }
          code=$(docker wait "$cid")
          echo "fixture-writer exit code: $code"
          docker logs "$cid" 2>&1 | tail -80
          [ "$code" = "0" ] || { echo "::error::live seed failed (exit $code)"; exit 1; }

      - name: Verify fixtures are now real (non-stub)
        run: |
          set -e
          test -s demo/fixtures/weaviate_facts.jsonl || { echo "::error::weaviate_facts.jsonl is still empty"; exit 1; }
          test -s demo/fixtures/neo4j_graph.cypher   || { echo "::error::neo4j_graph.cypher is empty"; exit 1; }
          if grep -q '"_stub"' demo/fixtures/mongo_seed.json; then echo "::error::mongo_seed.json is still a stub"; exit 1; fi
          echo "Fixture line counts:"; wc -l demo/fixtures/weaviate_facts.jsonl demo/fixtures/neo4j_graph.cypher demo/fixtures/mongo_seed.json

      - name: Commit regenerated fixtures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demo/fixtures/
          if git diff --cached --quiet; then
            echo "No fixture changes to commit."
          else
            git commit \
              -m "chore(demo): regenerate real demo fixtures via live ingestion" \
              -m "Generated by the Regenerate demo fixtures workflow (Gemini extraction + Jina embeddings) so make demo seeds a real corpus with zero API keys."
            git push origin HEAD:${{ github.ref_name }}
            echo "Committed regenerated fixtures to ${{ github.ref_name }}."
          fi

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f demo/docker-compose.regen.yml ps -a || true
          docker compose -f docker-compose.yml -f demo/docker-compose.regen.yml logs --no-color --tail=all || true

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f demo/docker-compose.regen.yml down -v || true
